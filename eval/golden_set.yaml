# Golden evaluation set.
#
# Each item is a question with a list of expected arXiv papers an expert would
# consider essential in the top results. Tags let us slice metrics: the
# headline metric is `foundational_recall@k` because pure-vector RAG
# systematically misses foundational ancestor papers.
#
# Build the index with a corresponding topic query before running eval:
#   python scripts/build_index.py --query "diffusion models" --max-papers 400
#
# Or build several topic-specific indexes and run eval against each.

- question: "What are the foundational papers behind diffusion models for image generation?"
  topic: diffusion
  expected:
    - id: "1503.03585"
      title: "Deep Unsupervised Learning using Nonequilibrium Thermodynamics"
      tags: [foundational]
    - id: "2006.11239"
      title: "Denoising Diffusion Probabilistic Models"
      tags: [foundational]
    - id: "1907.05600"
      title: "Generative Modeling by Estimating Gradients of the Data Distribution"
      tags: [foundational]
    - id: "2011.13456"
      title: "Score-Based Generative Modeling through Stochastic Differential Equations"
      tags: [foundational]
    - id: "2105.05233"
      title: "Diffusion Models Beat GANs on Image Synthesis"
      tags: [recent]
    - id: "2112.10752"
      title: "High-Resolution Image Synthesis with Latent Diffusion Models"
      tags: [recent]

